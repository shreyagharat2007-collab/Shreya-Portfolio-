<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Weather App</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    transition:0.2s ease;
}

body{
    font-family:'Inter',sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    overflow-y:auto;

    background:linear-gradient(to bottom right,#0f172a,#1e293b);

    transition:0.8s ease;

    background-size:400% 400%;

    animation:bgMove 12s ease infinite;

    scroll-behavior:smooth;
}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* BACKGROUND BLOBS */

.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    z-index:-1;
}

.blob1{
    width:250px;
    height:250px;
    background:#3b82f6;
    top:-80px;
    left:-80px;
}

.blob2{
    width:250px;
    height:250px;
    background:#9333ea;
    bottom:-80px;
    right:-80px;
}

/* CONTAINER */

.container{

    width:100%;
    max-width:420px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:28px;

    padding:30px;

    text-align:center;

    color:white;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.2),
    0 0 40px rgba(255,255,255,0.08);

    animation:float 5s ease-in-out infinite;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

}

.container:hover{

box-shadow:
0 12px 40px rgba(0,0,0,0.25),
0 0 50px rgba(255,255,255,0.12);

}

/* TITLE */

h1{
    font-size:32px;
    font-weight:700;
    color:white;
}

.subtitle{
    color:#d1d5db;
    margin-top:8px;
    font-size:14px;
    margin-bottom:25px;
}

/* SEARCH */

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.search-input{
    position:relative;
    flex:1;
}

.search-input i{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:#d1d5db;
}

input{

    width:100%;

    padding:14px 14px 14px 42px;

    border:none;
    outline:none;

    border-radius:14px;

    background:rgba(255,255,255,0.15);

    color:white;

    font-size:15px;

    border:1px solid rgba(255,255,255,0.1);
}

input::placeholder{
    color:#d1d5db;
}

/* BUTTON */

button{

    padding:14px 18px;

    border:none;

    border-radius:14px;

    background:rgba(255,255,255,0.9);

    color:#111827;

    backdrop-filter:blur(10px);

    cursor:pointer;

    font-weight:600;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

button:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

/* WEATHER */

.weather-box{
    margin-top:25px;
    color:white;
    animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.weather-main img{
    width:120px;
}

.temp{
    font-size:64px;
    font-weight:700;
    letter-spacing:-2px;
}

.condition{
    font-size:18px;
    color:#e5e7eb;
    margin-top:6px;
}

.description{
    margin-top:10px;
    color:#d1d5db;
    font-size:14px;
}

.date-time{
   margin-top:10px;
   font-size:13px;
   color:#d1d5db;
}

/* DETAILS */

.details{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    margin-top:25px;
}

.card{

    background:rgba(255,255,255,0.10);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:18px;

    padding:18px;

    text-align:center;
}

.card i{
    font-size:22px;
    margin-bottom:10px;
}

.card h3{
    font-size:18px;
    margin-bottom:5px;
}

.card p{
    color:#d1d5db;
    font-size:13px;
}

.card:hover{
transform:translateY(-4px);
background:rgba(255,255,255,0.18);
}

/* LOADER */

.loader{

    width:45px;
    height:45px;

    border:4px solid rgba(255,255,255,0.2);

    border-top:4px solid white;

    border-radius:50%;

    margin:25px auto;

    animation:spin 1s linear infinite;
}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

/* ERROR */

.error-box{

    background:rgba(255,0,0,0.15);

    border:1px solid rgba(255,255,255,0.1);

    padding:18px;

    border-radius:16px;

    margin-top:20px;
}

/* RESPONSIVE */

@media(max-width:600px){

.container{
padding:24px 18px;
}

h1{
font-size:26px;
}

.search-box{
flex-direction:column;
}

.details{
grid-template-columns:1fr;
}

.temp{
font-size:48px;
}

}

</style>
</head>

<body>

<!-- BLOBS -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">

<h1>🌦 Weather App</h1>

<p class="subtitle">
Real-time weather updates anywhere
</p>

<!-- SEARCH -->
<div class="search-box">

<div class="search-input">

<i class="fas fa-search"></i>

<input
type="text"
id="cityInput"
autocomplete="off"
autocapitalize="off"
spellcheck="false"
placeholder="Enter city, village or area">

</div>

<button onclick="getWeather()">

<i class="fas fa-location-dot"></i>

Search

</button>

</div>

<!-- CURRENT LOCATION -->
<button
style="width:100%;"
onclick="getLocationWeather()">

<i class="fas fa-location-crosshairs"></i>

Current Location

</button>

<!-- WEATHER RESULT -->
<div
class="weather-box"
id="weatherResult">

</div>

</div>

<script>

/* API KEY */

let apiKey =
"2ff1deb4df100b85c210833e77dab7cf";

/* ENTER KEY */

document
.getElementById("cityInput")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){
getWeather();
}

});

/* SEARCH WEATHER */

function getWeather(){

let city =
document.getElementById("cityInput")
.value
.trim();

if(city === ""){
return;
}

/* LOADER */

document.getElementById("weatherResult")
.innerHTML =
`<div class="loader"></div>`;

/* DIRECT WEATHER API */

let url =
`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

fetch(url)

.then(res => res.json())

.then(data => {

if(data.cod != 200){

document.getElementById("weatherResult")
.innerHTML = `

<div class="error-box">

<h3>❌ Location Not Found</h3>


</div>
`;

return;
}

showWeather(data);

})

.catch(()=>{

document.getElementById("weatherResult")
.innerHTML = `

<div class="error-box">

<h3>⚠️ Network Error</h3>

<p>
Please try again
</p>

</div>
`;

});

}

/* CURRENT LOCATION WEATHER */

function getLocationWeather(){

navigator.geolocation.getCurrentPosition(

(position)=>{

let lat = position.coords.latitude;
let lon = position.coords.longitude;

let url =
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${apiKey}&units=metric`;

fetchWeather(url);

},

()=>{

document.getElementById("weatherResult")
.innerHTML = `

<div class="error-box">

<h3>📍 Location Access Denied</h3>

<p>
Please allow location permission
</p>

</div>
`;

}

);

}

/* FETCH WEATHER */

function fetchWeather(url){

document.getElementById("weatherResult")
.innerHTML =
`<div class="loader"></div>`;

fetch(url)

.then(res => res.json())

.then(data => {

if(data.cod != 200){

document.getElementById("weatherResult")
.innerHTML = `

<div class="error-box">

<h3>❌ City Not Found</h3>

<p>Please enter a valid city</p>

</div>
`;

return;
}

showWeather(data);

});

}

/* SHOW WEATHER */

function showWeather(data){

let temp = data.main.temp;

let feelsLike =
data.main.feels_like;

let humidity =
data.main.humidity;

let wind =
data.wind.speed;

let weather =
data.weather[0].main;

let name =
data.name;

let icon =
data.weather[0].icon;

let condition =
data.weather[0]
.main
.toLowerCase();

let sunrise =
new Date(
data.sys.sunrise * 1000
).toLocaleTimeString();

let sunset =
new Date(
data.sys.sunset * 1000
).toLocaleTimeString();

/* EMOJI */

let emoji = "☀️";

if(condition.includes("cloud"))
emoji = "☁️";

if(condition.includes("rain"))
emoji = "🌧️";

if(condition.includes("snow"))
emoji = "❄️";

if(condition.includes("thunder"))
emoji = "⛈️";

/* BACKGROUND */

if(condition.includes("clear")){

document.body.style.background =
"linear-gradient(135deg,#f59e0b,#f97316)";
}

else if(condition.includes("cloud")){

document.body.style.background =
"linear-gradient(135deg,#64748b,#334155)";
}

else if(condition.includes("rain")){

document.body.style.background =
"linear-gradient(135deg,#2563eb,#1e3a8a)";
}

else if(condition.includes("snow")){

document.body.style.background =
"linear-gradient(135deg,#94a3b8,#475569)";
}

else if(condition.includes("thunder")){

document.body.style.background =
"linear-gradient(135deg,#111827,#000000)";
}

/* DESCRIPTION */

let desc =
"Clear skies and beautiful weather today ✨";

if(condition.includes("rain")){
desc =
"Carry an umbrella and enjoy the rain ☔";
}

if(condition.includes("snow")){
desc =
"Stay warm outside ❄️";
}

if(condition.includes("cloud")){
desc =
"Cloudy atmosphere with cool vibes ☁️";
}

/* ICON URL */

let iconUrl =
`https://openweathermap.org/img/wn/${icon}@2x.png`;

/* SHOW WEATHER */

document.getElementById("weatherResult")
.innerHTML = `

<div class="weather-main">

<h2>${emoji} ${name}</h2>

<img src="${iconUrl}">

<div class="temp">
${Math.round(temp)}°C
</div>

<div class="condition">
${weather}
</div>

<div class="description">
${desc}
</div>

<div class="date-time">
🕒 ${new Date().toLocaleString()}
</div>

</div>

<div class="details">

<div class="card">

<i class="fas fa-temperature-half"></i>

<h3>
${Math.round(feelsLike)}°C
</h3>

<p>Feels Like</p>

</div>

<div class="card">

<i class="fas fa-droplet"></i>

<h3>
${humidity}%
</h3>

<p>Humidity</p>

</div>

<div class="card">

<i class="fas fa-wind"></i>

<h3>
${wind} km/h
</h3>

<p>Wind Speed</p>

</div>

<div class="card">

<i class="fas fa-sun"></i>

<h3>
${sunrise}
</h3>

<p>Sunrise</p>

</div>

<div class="card">

<i class="fas fa-moon"></i>

<h3>
${sunset}
</h3>

<p>Sunset</p>

</div>

</div>
`;

}

</script>

</body>
</html>
